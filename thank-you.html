<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Resonwave Technology</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .thank-you-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #fff;
        }
        .thank-you-content { max-width: 600px; }
        .thank-you-content h1 {
            color: var(--brand-purple);
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .thank-you-content p {
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .back-home-btn { text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <section class="thank-you-wrapper">
        <div class="thank-you-content">
            <span class="sub-label" style="text-transform: uppercase; letter-spacing: 1px;">Submission Successful</span>
            <h1>Thank You.</h1>
            
            <p>
                Thank you for contacting <strong>Resonwave Technology</strong>. 
                Your email has been received!! <br><br>
                Thank you, <br>
                <strong>Resonwave Team</strong>
            </p>
            
            <a href="index.html" class="back-home-btn btn-purple-box">
                Return to Homepage
            </a>
        </div>
    </section>

</body>
</html>
